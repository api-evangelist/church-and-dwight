aid: church-and-dwight
name: Church and Dwight
x-type: company
description: >-
  Church & Dwight Co., Inc. is a Fortune 500 American consumer packaged
  goods (CPG) company headquartered in Princeton, New Jersey, that
  manufactures and markets a portfolio of household, personal care,
  health and wellness, beauty, and specialty products. Best known as the
  parent company of the Arm & Hammer baking soda brand (the company's
  flagship since 1846), Church & Dwight operates through three reporting
  segments: Consumer Domestic, Consumer International, and Specialty
  Products Division. The company's brand portfolio includes Arm & Hammer,
  Trojan, OxiClean, Vitafusion, L'il Critters, Therabreath, Hero (Mighty
  Patch), Batiste, Waterpik, OraJel, Nair, Spinbrush, First Response,
  RepHresh, Zicam, Flawless, Toppik, Viviscal, Kaboom, Orange Glo, XTRA
  laundry detergent, and Arrid antiperspirant. Church & Dwight does not
  currently publish a public consumer-facing developer API; partner
  integrations are managed through internal portals, and consumer
  experiences focus on brand websites, e-commerce direct-to-consumer
  storefronts, and the Innovation Portal for external R&D partnerships.
